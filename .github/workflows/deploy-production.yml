name: Deploy production

on:
  workflow_dispatch:
    inputs:
      mode:
        description: validate checks connectivity and prerequisites; deploy updates production
        required: true
        default: validate
        type: choice
        options:
          - validate
          - deploy

permissions:
  id-token: write
  contents: read
  checks: read

concurrency:
  group: web-orbital-wallet-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AWS_REGION: us-east-1
  TARGET_ROLE_ARN: arn:aws:iam::373317458963:role/WebOrbitalWalletProdDeployRole
  S3_BUCKET: web-orbital-wallet-prod-373317458963
  TARGET_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.TARGET_CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    name: Deploy web wallet production
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    steps:
      - name: Verify production branch
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "main"

      - name: Verify required checks passed
        if: inputs.mode == 'deploy'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUIRED_CHECKS: Build,Terraform validate
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          required = [check.strip() for check in os.environ['REQUIRED_CHECKS'].split(',') if check.strip()]
          url = f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/commits/{os.environ['GITHUB_SHA']}/check-runs?per_page=100"
          request = urllib.request.Request(
              url,
              headers={
                  'Accept': 'application/vnd.github+json',
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              runs = json.load(response)['check_runs']

          failed = []
          for check in required:
              matches = [run for run in runs if run['name'] == check]
              if not any(run['conclusion'] == 'success' for run in matches):
                  failed.append(check)

          if failed:
              print(f"Required checks are not successful for {os.environ['GITHUB_SHA']}: {', '.join(failed)}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          role-to-assume: ${{ env.TARGET_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Cache Bun packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Validate local artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          if test -d dist/assets; then
            echo "HAS_DIST_ASSETS=true" >> "$GITHUB_ENV"
          else
            echo "dist/assets is absent; immutable asset sync will be skipped."
            echo "HAS_DIST_ASSETS=false" >> "$GITHUB_ENV"
          fi

      - name: Validate static hosting targets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$S3_BUCKET"
          test -n "$TARGET_CLOUDFRONT_DISTRIBUTION_ID"
          aws s3api head-bucket --bucket "$S3_BUCKET"
          aws cloudfront get-distribution --id "$TARGET_CLOUDFRONT_DISTRIBUTION_ID" --query 'Distribution.Status' --output text

      - name: Upload app shell
        if: inputs.mode == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync dist/ "s3://$S3_BUCKET/" \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache,max-age=0,must-revalidate"

      - name: Upload immutable assets
        if: inputs.mode == 'deploy' && env.HAS_DIST_ASSETS == 'true'
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync dist/assets/ "s3://$S3_BUCKET/assets/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Invalidate CloudFront
        if: inputs.mode == 'deploy'
        shell: bash
        run: |
          set -euo pipefail
          aws cloudfront create-invalidation \
            --distribution-id "$TARGET_CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
