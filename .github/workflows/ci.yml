name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Cache Bun packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Validate static artifact shape
        run: |
          test -f dist/index.html
          test -d dist/assets

  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.1

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra

      - name: Validate bootstrap Terraform
        run: terraform -chdir=infra/bootstrap init -backend=false && terraform -chdir=infra/bootstrap validate

      - name: Validate prod Terraform
        run: terraform -chdir=infra/prod init -backend=false && terraform -chdir=infra/prod validate
